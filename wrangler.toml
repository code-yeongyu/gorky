name = "gorky"
main = "src/index.ts"
compatibility_date = "2026-06-02"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "gorky-db"
database_id = "bced0849-a19c-42d3-8f81-6bd195a8e39b"

[[kv_namespaces]]
binding = "LOGIN_STATE"
id = "2a4428556a37498c84dbaf42588c9a27"
preview_id = "2a4428556a37498c84dbaf42588c9a27"

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
run_worker_first = ["/api/*", "/v1/*", "/health", "/__qa/*"]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
GROK_CLIENT_VERSION = "0.2.16"
GROK_CLI_PROXY_BASE_URL = "https://cli-chat-proxy.grok.com/v1"
GROK_PUBLIC_API_BASE_URL = "https://api.x.ai/v1"
AUTH_ISSUER = "https://auth.x.ai"
OIDC_CLIENT_ID = "b1a00492-073a-47ea-816f-4c329264a828"
GORKY_QA_MODE = "false"

[env.production]
name = "gorky"
routes = [{ pattern = "gorky.labs.mengmota.com", custom_domain = true }]

[[env.production.d1_databases]]
binding = "DB"
database_name = "gorky-db"
database_id = "bced0849-a19c-42d3-8f81-6bd195a8e39b"

[[env.production.kv_namespaces]]
binding = "LOGIN_STATE"
id = "2a4428556a37498c84dbaf42588c9a27"
